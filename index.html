<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtPulse | Official Portal</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Your Public Key
            emailjs.init("mAPZnbtiyWpZVLyfp");
        })();
    </script>

    <style>
        :root {
            --lavender: #e2d1f9;
            --mint: #d1f9e8;
            --text-dark: #4a4e69;
            --glass: rgba(255, 255, 255, 0.8);
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: linear-gradient(135deg, var(--lavender) 0%, var(--mint) 100%);
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            color: var(--text-dark);
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(12px);
            border: 1px solid white;
            border-radius: 30px;
            padding: 35px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            height: fit-content;
        }

        h2 { text-align: center; color: #8e7dff; margin-bottom: 25px; }

        .field { margin-bottom: 18px; }

        label { display: block; font-size: 0.85rem; font-weight: bold; margin-bottom: 6px; color: #777; }

        input, textarea {
            width: 100%;
            padding: 14px;
            border-radius: 15px;
            border: 1px solid #fff;
            background: rgba(255,255,255,0.6);
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus, textarea:focus {
            background: white;
            border-color: #8e7dff;
            box-shadow: 0 0 10px rgba(142, 125, 255, 0.2);
        }

        #sendBtn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 15px;
            background: #8e7dff;
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(142, 125, 255, 0.3);
            transition: 0.3s;
        }

        #sendBtn:hover { transform: translateY(-2px); box-shadow: 0 12px 20px rgba(142, 125, 255, 0.4); }
        #sendBtn:disabled { background: #ccc; cursor: not-allowed; }

        .logs-title { margin-top: 40px; border-top: 1px solid #ddd; padding-top: 20px; font-size: 1.1rem; }

        .log-item {
            background: white;
            padding: 15px;
            border-radius: 15px;
            margin-bottom: 12px;
            border-left: 6px solid var(--mint);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .time-stamp { font-size: 0.7rem; color: #aaa; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="card">
    <h2>✨ Post Your Work</h2>
    
    <div class="field">
        <label>Your Gmail Address</label>
        <input type="email" id="uEmail" placeholder="yourname@gmail.com">
    </div>

    <div class="field">
        <label>Work Title</label>
        <input type="text" id="uTitle" placeholder="Ex: My First Digital Art">
    </div>

    <div class="field">
        <label>Content (Text or Links)</label>
        <textarea id="uContent" rows="5" placeholder="Paste your work content or video link here..."></textarea>
    </div>

    <button id="sendBtn" onclick="sendSubmission()">Deliver to Judge</button>

    <div class="logs-title">Submission History</div>
    <div id="logsContainer"></div>
</div>

<script>
    function sendSubmission() {
        const btn = document.getElementById('sendBtn');
        const email = document.getElementById('uEmail').value;
        const title = document.getElementById('uTitle').value;
        const content = document.getElementById('uContent').value;
        const now = new Date();
        const timeStr = now.toLocaleDateString() + " | " + now.toLocaleTimeString();

        if(!email || !title || !content) {
            alert("Please complete all fields!");
            return;
        }

        btn.innerText = "Sending to Gmail...";
        btn.disabled = true;

        const params = {
            from_name: email,
            work_title: title,
            work_desc: content,
            submission_time: timeStr
        };

        // Sending via your verified Service and Template IDs
        emailjs.send('service_ikiqqyi', 'template_h851dko', params)
            .then(() => {
                alert("🚀 Success! Your work was delivered to eiyanguray@gmail.com");
                saveLog(email, title, timeStr);
                resetForm();
            })
            .catch((err) => {
                alert("Error: " + JSON.stringify(err));
            })
            .finally(() => {
                btn.innerText = "Deliver to Judge";
                btn.disabled = false;
            });
    }

    function saveLog(email, title, time) {
        let logs = JSON.parse(localStorage.getItem('artPulseLogs')) || [];
        logs.unshift({ email, title, time });
        localStorage.setItem('artPulseLogs', JSON.stringify(logs));
        renderLogs();
    }

    function renderLogs() {
        const container = document.getElementById('logsContainer');
        const logs = JSON.parse(localStorage.getItem('artPulseLogs')) || [];
        container.innerHTML = logs.map(l => `
            <div class="log-item">
                <strong>${l.title}</strong><br>
                <span style="font-size:0.8rem">${l.email}</span>
                <span class="time-stamp">Delivered on: ${l.time}</span>
            </div>
        `).join('');
    }

    function resetForm() {
        document.getElementById('uTitle').value = '';
        document.getElementById('uContent').value = '';
    }

    renderLogs();
</script>

</body>
</html>
