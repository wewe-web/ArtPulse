<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtPulse | All-in-One Tools</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    
    <style>
        :root {
            --lavender: #e2d1f9;
            --mint: #d1f9e8;
            --sky: #d9e4ff;
            --purple: #7b61ff;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--lavender), var(--mint), var(--sky));
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #444;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .tool-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            border: 1px solid white;
        }

        h2 { color: var(--purple); font-size: 1.2rem; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        input, select, textarea {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: var(--purple);
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { opacity: 0.9; transform: scale(1.02); }

        /* Calculator Specific */
        .calc-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 5px;
        }
        .calc-display {
            grid-column: span 4;
            background: #fff;
            padding: 15px;
            text-align: right;
            font-size: 1.5rem;
            border-radius: 10px;
            margin-bottom: 10px;
            border: 1px solid #eee;
        }
    </style>
</head>
<body>

<h1 style="color: white; text-shadow: 2px 2px 4px rgba(0,0,0,0.1);">✨ ArtPulse Tools</h1>

<div class="container">
    
    <div class="tool-card">
        <h2>📊 Excel Maker (Report Card)</h2>
        <label>Student Name</label>
        <input type="text" id="studentName" placeholder="Juan Dela Cruz">
        <label>Section</label>
        <input type="text" id="studentSection" placeholder="Grade 7 - Dakila">
        <label>Average Grade</label>
        <input type="number" id="studentGrade" placeholder="90">
        <button onclick="generateExcel()">Download Excel Card</button>
    </div>

    <div class="tool-card">
        <h2>📥 Link Downloader</h2>
        <input type="text" id="dlLink" placeholder="Paste link here...">
        <select id="dlFormat">
            <option value="pdf">Convert to PDF</option>
            <option value="png">Convert to PNG</option>
            <option value="jpeg">Convert to JPEG</option>
        </select>
        <button onclick="simulateDownload()">Download File</button>
        <p style="font-size: 0.7rem; color: #888;">*Note: Simulates conversion for UI demo.</p>
    </div>

    <div class="tool-card">
        <h2>🗣️ Text to Speech</h2>
        <textarea id="ttsText" rows="3" placeholder="Type something to hear it..."></textarea>
        <button onclick="speakText()" style="background: #ffcfdf; color: #b04b6a;">🔊 Play Voice</button>
    </div>

    <div class="tool-card">
        <h2>🧮 Calculator</h2>
        <div id="display" class="calc-display">0</div>
        <div class="calc-grid">
            <button onclick="clearCalc()" style="background:#ffcfdf; color:#b04b6a">C</button>
            <button onclick="press('/')">/</button>
            <button onclick="press('*')">*</button>
            <button onclick="press('-')">-</button>
            <button onclick="press('7')">7</button>
            <button onclick="press('8')">8</button>
            <button onclick="press('9')">9</button>
            <button onclick="press('+')">+</button>
            <button onclick="press('4')">4</button>
            <button onclick="press('5')">5</button>
            <button onclick="press('6')">6</button>
            <button onclick="calculate()" style="background:var(--mint); color:#2d6a4f; grid-row: span 2">=</button>
            <button onclick="press('1')">1</button>
            <button onclick="press('2')">2</button>
            <button onclick="press('3')">3</button>
            <button onclick="press('0')" style="grid-column: span 3">0</button>
        </div>
    </div>

</div>

<script>
    // --- EXCEL GENERATOR ---
    function generateExcel() {
        const name = document.getElementById('studentName').value || "Student";
        const section = document.getElementById('studentSection').value || "N/A";
        const grade = document.getElementById('studentGrade').value || "0";

        const data = [
            ["PHILIPPINES DEPARTMENT OF EDUCATION", "", ""],
            ["REPORT CARD", "", ""],
            ["", "", ""],
            ["Student Name:", name, ""],
            ["Section:", section, ""],
            ["", "", ""],
            ["SUBJECT", "GRADE", "REMARKS"],
            ["Filipino", grade, grade >= 75 ? "Passed" : "Failed"],
            ["English", grade, grade >= 75 ? "Passed" : "Failed"],
            ["Mathematics", grade, grade >= 75 ? "Passed" : "Failed"],
            ["Science", grade, grade >= 75 ? "Passed" : "Failed"],
            ["MAPEH", grade, grade >= 75 ? "Passed" : "Failed"],
        ];

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(data);
        XLSX.utils.book_append_sheet(wb, ws, "ReportCard");
        XLSX.writeFile(wb, `${name}_ReportCard.xlsx`);
    }

    // --- DOWNLOADER SIMULATOR ---
    function simulateDownload() {
        const link = document.getElementById('dlLink').value;
        const format = document.getElementById('dlFormat').value;
        if(!link) return alert("Paste a link first!");
        
        alert(`Connecting to server...\nFile converted to ${format.toUpperCase()}\nDownload starting!`);
        
        // This is a "dummy" download for UI purposes
        const a = document.createElement('a');
        a.href = "data:text/plain;charset=utf-8,ArtPulseDownloadData";
        a.download = `ArtPulse_File.${format}`;
        a.click();
    }

    // --- TEXT TO SPEECH ---
    function speakText() {
        const text = document.getElementById('ttsText').value;
        if(!text) return alert("Type something!");
        const msg = new SpeechSynthesisUtterance(text);
        window.speechSynthesis.speak(msg);
    }

    // --- CALCULATOR LOGIC ---
    let calcVal = "";
    function press(num) {
        calcVal += num;
        document.getElementById('display').innerText = calcVal;
    }
    function clearCalc() {
        calcVal = "";
        document.getElementById('display').innerText = "0";
    }
    function calculate() {
        try {
            calcVal = eval(calcVal).toString();
            document.getElementById('display').innerText = calcVal;
        } catch {
            document.getElementById('display').innerText = "Error";
            calcVal = "";
        }
    }
</script>

</body>
</html>
