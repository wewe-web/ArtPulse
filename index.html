<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ArtPulse | Grading Edition</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("mAPZnbtiyWpZVLyfp");
        })();
    </script>

    <style>
        :root {
            --lavender: #e2d1f9;
            --mint: #d1f9e8;
            --purple: #7b61ff;
            --glass: rgba(255, 255, 255, 0.95);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, var(--lavender), var(--mint));
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
            color: #333;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2, h3 { text-align: center; color: var(--purple); margin-top: 0; }

        .field { margin-bottom: 12px; }
        label { display: block; font-size: 0.75rem; font-weight: bold; margin-bottom: 4px; color: #666; }

        input, textarea {
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #ddd;
            box-sizing: border-box;
        }

        .upload-area {
            border: 2px dashed var(--purple);
            padding: 10px;
            text-align: center;
            border-radius: 12px;
            background: rgba(255,255,255,0.5);
            cursor: pointer;
            font-size: 0.9rem;
        }

        #file-preview {
            max-width: 100%;
            height: 60px;
            margin-top: 5px;
            display: none;
            border-radius: 5px;
            object-fit: contain;
        }

        .btn-main {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: var(--purple);
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .history-section {
            margin-top: 25px;
            border-top: 2px solid #eee;
            padding-top: 15px;
        }

        .log-entry {
            background: white;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 12px;
            border-left: 5px solid var(--purple);
            font-size: 0.85rem;
            position: relative;
        }

        .grading-box {
            display: flex;
            gap: 5px;
            margin-top: 8px;
            background: #f9f9f9;
            padding: 5px;
            border-radius: 8px;
        }

        .grade-input {
            width: 60px;
            padding: 5px;
            text-align: center;
        }

        .btn-grade {
            background: var(--mint);
            border: 1px solid #ccc;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.7rem;
            padding: 5px 10px;
        }

        .btn-download {
            background: #fff;
            color: var(--purple);
            border: 2px solid var(--purple);
            margin-top: 15px;
            padding: 10px;
            width: 100%;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
        }

        .timestamp { color: #999; font-size: 0.7rem; }
    </style>
</head>
<body>

<div class="card">
    <h2>🎨 ArtPulse Portal</h2>
    
    <div class="field">
        <label>Sender Gmail</label>
        <input type="email" id="uEmail" placeholder="student@gmail.com">
    </div>

    <div class="field">
        <label>Work Title</label>
        <input type="text" id="uTitle" placeholder="Ex: Unit 1 Project">
    </div>

    <div class="field">
        <label>Upload Work</label>
        <div class="upload-area" onclick="document.getElementById('fileInput').click()">
            <span id="file-label">Click to upload 📁</span>
            <input type="file" id="fileInput" hidden onchange="processFile(event)">
            <center><img id="file-preview"></center>
        </div>
    </div>

    <div class="field">
        <label>Notes/Description</label>
        <textarea id="uDesc" rows="2" placeholder="Details..."></textarea>
    </div>

    <button id="sendBtn" class="btn-main" onclick="sendWithAttachment()">Send Submission</button>

    <div class="history-section">
        <h3>Judge's Panel</h3>
        <div id="logs"></div>
        <button class="btn-download" onclick="downloadCSV()">📥 Download CSV (with Grades)</button>
    </div>
</div>

<script>
    let base64File = "";

    function processFile(event) {
        const file = event.target.files[0];
        const label = document.getElementById('file-label');
        const preview = document.getElementById('file-preview');

        if (file) {
            label.innerText = file.name;
            const reader = new FileReader();
            reader.onload = function(e) {
                base64File = e.target.result;
                if(file.type.startsWith('image/')) {
                    preview.src = e.target.result;
                    preview.style.display = "block";
                }
            };
            reader.readAsDataURL(file);
        }
    }

    function sendWithAttachment() {
        const btn = document.getElementById('sendBtn');
        const email = document.getElementById('uEmail').value;
        const title = document.getElementById('uTitle').value;
        const desc = document.getElementById('uDesc').value;
        const time = new Date().toLocaleString();

        if(!email || !title) return alert("Missing info!");

        btn.innerText = "Processing...";
        btn.disabled = true;

        const params = {
            from_name: email,
            work_title: title,
            work_desc: desc,
            submission_time: time,
            content_file: base64File 
        };

        emailjs.send('service_ikiqqyi', 'template_h9enttv', params)
            .then(() => {
                alert("Sent successfully!");
                // Initial grade is blank
                saveToLocal(email, title, time, "");
                clearForm();
            })
            .catch(err => alert("Error: " + JSON.stringify(err)))
            .finally(() => {
                btn.innerText = "Send Submission";
                btn.disabled = false;
            });
    }

    function saveToLocal(email, title, time, grade) {
        let history = JSON.parse(localStorage.getItem('artPulseV2')) || [];
        // Unique ID based on time
        const id = Date.now();
        history.unshift({ id, email, title, time, grade });
        localStorage.setItem('artPulseV2', JSON.stringify(history));
        renderLogs();
    }

    function updateGrade(id) {
        const gradeVal = document.getElementById(`grade-${id}`).value;
        let history = JSON.parse(localStorage.getItem('artPulseV2')) || [];
        const index = history.findIndex(item => item.id === id);
        if (index !== -1) {
            history[index].grade = gradeVal;
            localStorage.setItem('artPulseV2', JSON.stringify(history));
            alert("Grade Saved!");
        }
    }

    function renderLogs() {
        const logsDiv = document.getElementById('logs');
        const history = JSON.parse(localStorage.getItem('artPulseV2')) || [];
        logsDiv.innerHTML = history.map(item => `
            <div class="log-entry">
                <strong>${item.title}</strong><br>
                ${item.email}<br>
                <span class="timestamp">${item.time}</span>
                <div class="grading-box">
                    <input type="text" id="grade-${item.id}" class="grade-input" placeholder="Grade" value="${item.grade || ''}">
                    <button class="btn-grade" onclick="updateGrade(${item.id})">Save Grade</button>
                </div>
            </div>
        `).join('');
    }

    function downloadCSV() {
        const history = JSON.parse(localStorage.getItem('artPulseV2')) || [];
        if(history.length === 0) return alert("Nothing to export!");

        let csv = "Title,Email,Date,Grade\n";
        history.forEach(row => {
            csv += `"${row.title}","${row.email}","${row.time}","${row.grade || 'N/A'}"\n`;
        });

        const blob = new Blob([csv], { type: 'text/csv' });
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.setAttribute('hidden', '');
        a.setAttribute('href', url);
        a.setAttribute('download', 'Class_Submissions_Report.csv');
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
    }

    function clearForm() {
        document.getElementById('uTitle').value = "";
        document.getElementById('uDesc').value = "";
        document.getElementById('fileInput').value = "";
        document.getElementById('file-label').innerText = "Click to upload 📁";
        document.getElementById('file-preview').style.display = "none";
        base64File = "";
    }

    renderLogs();
</script>

</body>
</html>
